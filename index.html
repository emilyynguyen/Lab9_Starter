  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>

    class DivideErr extends Error {
      constructor() {
        super('Cannot divide by zero.');
        this.name = 'DivideErr';
      }
    }

    window.onerror = function(message, source, lineno, colno, error) {
      console.log("global error!");
      return true; 
    };

    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
        let output = document.querySelector('output');
        let firstNum = document.querySelector('#first-num').value;
        let secondNum = document.querySelector('#second-num').value;
        let operator = document.querySelector('#operator').value;

      try {
          if (operator === '/' && Number(secondNum) === 0){
            throw new DivideErr();
          }
          output.textContent = eval(`${firstNum} ${operator} ${secondNum}`);
      } catch (err) {
          if (err instanceof DivideErr) {
            output.textContent = err.message + "!!";
          } else {
            output.textContent = err.message;
          }
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    errorBtns[0].addEventListener('click', () => {
      console.log('This is a console.log demonstration.');
    });

    errorBtns[1].addEventListener('click', () => {
      console.error('This is a console.error demonstration.');
    });

    errorBtns[2].addEventListener('click', () => {
      console.count('Button Click Count');
    });

    errorBtns[3].addEventListener('click', () => {
      console.warn('This is a console.warn demonstration.');
    });

    errorBtns[4].addEventListener('click', () => {
      console.assert(false, 'Assertion failed example.');
    });

    errorBtns[5].addEventListener('click', () => {
      console.clear();
    });

    errorBtns[6].addEventListener('click', () => {
      const student = {
        name: 'Emily',
        major: 'Mathematics-Computer Science',
        year: 3
      };

      console.dir(student);
    });

    errorBtns[7].addEventListener('click', () => {
      console.dirxml(document.body);
    });

    errorBtns[8].addEventListener('click', () => {
      console.group('UCSD Student Information');
      console.log('Name: Emily');
      console.log('Profession: Product Manager');
    });

    errorBtns[9].addEventListener('click', () => {
      console.groupEnd();
    });

    errorBtns[10].addEventListener('click', () => {
      const students = [
        { name: 'Emily', profession: 'Product Manager', major: 'Mathematics'},
        { name: 'Karina', profession: 'Celebrity', major: 'Dance'},
        { name: 'Aidan', profession: 'Software Engineer', major: 'Computer Engineering'},
        { name: 'Jason', profession: 'Aerospace Engineer', major: 'Aerospace Engineering'}
      ];

      console.table(students);
    });

    errorBtns[11].addEventListener('click', () => {
      console.time('Timer Demo');
    });

    errorBtns[12].addEventListener('click', () => {
      console.timeEnd('Timer Demo');
    });

    errorBtns[13].addEventListener('click', () => {
      console.trace("Testing console.trace()");
    });

    errorBtns[14].addEventListener('click', () => {
      notreal('hello world!');
    });
    
  </script>
</body>
